<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ArKey Vault - Manage your recovery codes" />
    <title>Vault - ArKey</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar"></aside>

    <!-- Main Content -->
    <main class="ml-64 min-h-screen">
      <div class="max-w-5xl mx-auto px-8 py-8">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-2xl font-semibold tracking-tight mb-1">Vault</h1>
            <p class="text-sm text-muted">Manage your encrypted recovery codes</p>
          </div>
          <button id="add-btn" class="btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span class="ml-2">Add Entry</span>
          </button>
        </header>

        <!-- Search & Filter -->
        <div class="flex items-center gap-3 mb-6">
          <div class="flex-1 relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-neutral-400" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              type="text"
              id="search-input"
              class="input pl-10"
              placeholder="Search recovery codes..."
            />
          </div>
        </div>

        <!-- Vault Entries -->
        <div id="vault-container" class="space-y-3">
          <!-- Populated by JS -->
        </div>

        <!-- Pagination (if needed) -->
        <div id="pagination" class="flex items-center justify-between mt-6 pt-4 border-t border-neutral-200 hidden">
          <p class="text-sm text-muted" id="entries-count">0 entries</p>
        </div>
      </div>
    </main>

    <!-- Add Entry Modal -->
    <div id="add-modal" class="modal-overlay hidden">
      <div class="modal-content p-6 animate-fade-in">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-lg font-semibold">Add Recovery Code</h2>
          <button id="close-modal" class="text-muted hover:text-primary transition-colors">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <form id="add-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-primary mb-1.5">Title</label>
            <input
              type="text"
              id="entry-title"
              class="input"
              placeholder="e.g., Google Account, GitHub, AWS"
              required
            />
            <p class="text-xs text-muted mt-1">A descriptive name to identify this recovery code</p>
          </div>

          <div>
            <label class="block text-sm font-medium text-primary mb-1.5">Recovery Code</label>
            <textarea
              id="entry-code"
              class="input resize-none"
              rows="3"
              placeholder="Enter your recovery code here..."
              required
            ></textarea>
            <p class="text-xs text-muted mt-1">This will be encrypted before storage</p>
          </div>

          <div class="pt-2 flex items-center justify-end gap-3">
            <button type="button" id="cancel-add" class="btn-outline btn-sm">Cancel</button>
            <button type="submit" id="save-entry" class="btn-primary btn-sm">
              Save Entry
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/src/scripts/vault.js"></script>
  </body>
</html>
